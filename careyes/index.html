
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Careyes · Sonic Architecture</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --forest:   #0d1a0f;
    --moss:     #1a2e1c;
    --fern:     #243d27;
    --gold:     #c9a84c;
    --gold-light: #e8c97a;
    --cream:    #f5f0e8;
    --muted:    rgba(245,240,232,0.45);
    --locked:   rgba(245,240,232,0.18);
  }

  html, body {
    height: 100%;
    background: var(--forest);
    color: var(--cream);
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    overflow-x: hidden;
  }

  /* ── Grain overlay ── */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    opacity: 0.6;
  }

  /* ── Ambient gradient blobs ── */
  .blob {
    position: fixed; border-radius: 50%; filter: blur(90px);
    pointer-events: none; z-index: 0; opacity: 0.18;
  }
  .blob-1 { width: 500px; height: 500px; background: #2a5c2e; top: -100px; right: -100px; animation: drift 18s ease-in-out infinite alternate; }
  .blob-2 { width: 400px; height: 400px; background: var(--gold); bottom: -80px; left: -80px; animation: drift 22s ease-in-out infinite alternate-reverse; opacity: 0.10; }
  @keyframes drift { from { transform: translate(0,0) scale(1); } to { transform: translate(40px, 30px) scale(1.1); } }

  /* ── Layout ── */
  .page {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 0 24px 80px;
  }

  /* ── Header ── */
  header {
    width: 100%; max-width: 480px;
    padding: 56px 0 40px;
    text-align: center;
    opacity: 0; animation: fadeUp 1.2s ease forwards 0.2s;
  }

  .eyebrow {
    font-family: 'Montserrat', sans-serif;
    font-weight: 200;
    font-size: 9px;
    letter-spacing: 0.35em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .hotel-name {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(48px, 12vw, 72px);
    line-height: 1;
    letter-spacing: 0.12em;
    color: var(--cream);
  }

  .divider {
    width: 40px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 20px auto;
  }

  .tagline {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 15px;
    letter-spacing: 0.08em;
    color: var(--muted);
  }

  /* ── Now playing card ── */
  .now-playing {
    width: 100%; max-width: 420px;
    background: linear-gradient(135deg, var(--moss), var(--fern));
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 2px;
    padding: 32px 28px;
    margin-bottom: 12px;
    opacity: 0; animation: fadeUp 1.2s ease forwards 0.5s;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  .np-label {
    font-size: 8px; letter-spacing: 0.4em; color: var(--gold);
    text-transform: uppercase; margin-bottom: 20px;
  }

  .np-mood {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px; font-weight: 300;
    color: var(--cream); margin-bottom: 4px;
  }

  .np-desc {
    font-size: 10px; letter-spacing: 0.15em; color: var(--muted);
    text-transform: uppercase; margin-bottom: 28px;
  }

  /* Waveform visualizer */
  .visualizer {
    display: flex; align-items: center; gap: 3px;
    height: 32px; margin-bottom: 24px;
  }
  .bar {
    width: 3px; border-radius: 2px;
    background: var(--gold);
    transform-origin: bottom;
    animation: none;
    height: 4px;
    transition: height 0.3s;
  }
  .playing .bar { animation: wave var(--d, 0.8s) ease-in-out infinite alternate; }
  .bar:nth-child(1)  { --d: 0.7s; }
  .bar:nth-child(2)  { --d: 0.9s; }
  .bar:nth-child(3)  { --d: 0.6s; }
  .bar:nth-child(4)  { --d: 1.1s; }
  .bar:nth-child(5)  { --d: 0.8s; }
  .bar:nth-child(6)  { --d: 0.5s; }
  .bar:nth-child(7)  { --d: 1.0s; }
  .bar:nth-child(8)  { --d: 0.75s; }
  .bar:nth-child(9)  { --d: 0.65s; }
  .bar:nth-child(10) { --d: 0.9s; }
  .bar:nth-child(11) { --d: 0.55s; }
  .bar:nth-child(12) { --d: 1.2s; }
  .bar:nth-child(13) { --d: 0.7s; }
  .bar:nth-child(14) { --d: 0.85s; }
  .bar:nth-child(15) { --d: 0.6s; }
  @keyframes wave {
    from { height: 4px; opacity: 0.4; }
    to   { height: var(--h, 24px); opacity: 1; }
  }
  .bar:nth-child(1)  { --h: 12px; }
  .bar:nth-child(2)  { --h: 20px; }
  .bar:nth-child(3)  { --h: 28px; }
  .bar:nth-child(4)  { --h: 16px; }
  .bar:nth-child(5)  { --h: 24px; }
  .bar:nth-child(6)  { --h: 10px; }
  .bar:nth-child(7)  { --h: 30px; }
  .bar:nth-child(8)  { --h: 18px; }
  .bar:nth-child(9)  { --h: 26px; }
  .bar:nth-child(10) { --h: 14px; }
  .bar:nth-child(11) { --h: 22px; }
  .bar:nth-child(12) { --h: 8px; }
  .bar:nth-child(13) { --h: 20px; }
  .bar:nth-child(14) { --h: 16px; }
  .bar:nth-child(15) { --h: 28px; }

  /* Controls */
  .controls {
    display: flex; align-items: center; justify-content: space-between;
  }

  .progress-wrap {
    flex: 1; margin-right: 20px;
  }
  .progress-bar {
    width: 100%; height: 1px;
    background: rgba(201,168,76,0.2);
    border-radius: 1px; cursor: pointer;
    position: relative;
  }
  .progress-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    border-radius: 1px;
    transition: width 0.5s linear;
  }
  .time {
    font-size: 9px; letter-spacing: 0.1em; color: var(--muted);
    margin-top: 6px; display: flex; justify-content: space-between;
  }

  .play-btn {
    width: 48px; height: 48px;
    border-radius: 50%;
    border: 1px solid var(--gold);
    background: transparent;
    color: var(--gold);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s;
    flex-shrink: 0;
  }
  .play-btn:hover {
    background: var(--gold);
    color: var(--forest);
    transform: scale(1.05);
  }
  .play-btn svg { width: 18px; height: 18px; }

  /* ── Mood grid ── */
  .moods-label {
    width: 100%; max-width: 420px;
    font-size: 8px; letter-spacing: 0.4em; color: var(--gold);
    text-transform: uppercase; margin-bottom: 16px;
    opacity: 0; animation: fadeUp 1.2s ease forwards 0.7s;
  }

  .moods {
    width: 100%; max-width: 420px;
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 8px;
    opacity: 0; animation: fadeUp 1.2s ease forwards 0.8s;
  }

  .mood-btn {
    border: 1px solid rgba(201,168,76,0.2);
    background: rgba(26,46,28,0.6);
    border-radius: 2px;
    padding: 18px 16px;
    cursor: pointer;
    transition: all 0.3s;
    text-align: left;
    position: relative;
    overflow: hidden;
  }
  .mood-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(201,168,76,0.08), transparent);
    opacity: 0; transition: opacity 0.3s;
  }
  .mood-btn:hover::before, .mood-btn.active::before { opacity: 1; }
  .mood-btn:hover { border-color: rgba(201,168,76,0.5); }
  .mood-btn.active { border-color: var(--gold); }

  .mood-icon { font-size: 18px; margin-bottom: 8px; display: block; }
  .mood-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px; font-weight: 300;
    color: var(--cream); display: block; margin-bottom: 2px;
  }
  .mood-sub {
    font-size: 8px; letter-spacing: 0.2em; color: var(--muted);
    text-transform: uppercase;
  }

  /* Locked mood */
  .mood-btn.locked {
    cursor: default;
    opacity: 0.45;
  }
  .mood-btn.locked:hover { border-color: rgba(201,168,76,0.2); }
  .mood-btn.locked::before { display: none; }
  .lock-icon {
    position: absolute; top: 12px; right: 12px;
    font-size: 10px; color: var(--gold); opacity: 0.6;
  }
  .locked-tag {
    display: inline-block;
    font-size: 7px; letter-spacing: 0.2em;
    color: var(--gold); opacity: 0.7;
    text-transform: uppercase; margin-top: 4px;
    border: 1px solid rgba(201,168,76,0.3);
    padding: 2px 6px; border-radius: 1px;
  }

  /* ── Footer ── */
  footer {
    width: 100%; max-width: 420px;
    margin-top: 48px; text-align: center;
    opacity: 0; animation: fadeUp 1.2s ease forwards 1.0s;
  }
  .footer-divider {
    width: 60px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(201,168,76,0.3), transparent);
    margin: 0 auto 20px;
  }
  .footer-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px; letter-spacing: 0.4em;
    color: rgba(245,240,232,0.25); text-transform: uppercase;
  }
  .footer-sub {
    font-size: 8px; letter-spacing: 0.2em;
    color: rgba(245,240,232,0.15); margin-top: 4px;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Mobile refinements */
  @media (max-width: 400px) {
    .now-playing { padding: 24px 20px; }
    .moods { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="page">

  <header>
    <p class="eyebrow">Sonic Architecture · Amenidad Exclusiva</p>
    <h1 class="hotel-name">CAREYES</h1>
    <div class="divider"></div>
    <p class="tagline">Cada hora tiene su frecuencia</p>
  </header>

  <!-- Now Playing Card -->
  <div class="now-playing" id="playerCard">
    <p class="np-label">Reproduciendo ahora</p>
    <p class="np-mood" id="npMood">Aire</p>
    <p class="np-desc" id="npDesc">Brisa · Libertad · Energía suave</p>

    <div class="visualizer" id="visualizer">
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </div>

    <div class="controls">
      <div class="progress-wrap">
        <div class="progress-bar" id="progressBar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="time">
          <span id="currentTime">0:00</span>
          <span id="totalTime">--:--</span>
        </div>
      </div>
      <button class="play-btn" id="playBtn" onclick="togglePlay()">
        <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M8 5v14l11-7z"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Hidden audio -->
  <audio id="audio" preload="metadata">
    <source src="TRACK_AIRE.wav" type="audio/wav">
    <source src="TRACK_AIRE.mp3" type="audio/mpeg">
  </audio>

  <!-- Mood selector -->
  <p class="moods-label">Selecciona tu momento</p>
  <div class="moods">

    <button class="mood-btn locked" onclick="void(0)">
      <span class="lock-icon">🔒</span>
      <span class="mood-icon">🌅</span>
      <span class="mood-name">Sunrise</span>
      <span class="mood-sub">Amanecer</span>
      <span class="locked-tag">Solo huéspedes</span>
    </button>

    <button class="mood-btn active" id="daylightBtn"
      onclick="selectMood('Aire','Brisa · Libertad · Energía suave','TRACK_AIRE.mp3', this)">
      <span class="mood-icon">☀️</span>
      <span class="mood-name">Daylight</span>
      <span class="mood-sub">Alberca · Lectura</span>
    </button>

    <button class="mood-btn" id="sunsetBtn"
      onclick="selectMood('Sunset','Golden Hour · Atardecer · Deep House orgánico','Demo-Sunset.mp3', this)">
      <span class="mood-icon">🌇</span>
      <span class="mood-name">Sunset</span>
      <span class="mood-sub">Golden Hour</span>
    </button>

    <button class="mood-btn locked" onclick="void(0)">
      <span class="lock-icon">🔒</span>
      <span class="mood-icon">🌿</span>
      <span class="mood-name">Grounding</span>
      <span class="mood-sub">Descanso nocturno</span>
      <span class="locked-tag">Solo huéspedes</span>
    </button>

  </div>

  <footer>
    <div class="footer-divider"></div>
    <p class="footer-logo">MiZen · Sonic Architecture</p>
    <p class="footer-sub">Diseñado exclusivamente para Careyes</p>
  </footer>

</div>

<script>
  const audio = document.getElementById('audio');
  const playIcon = document.getElementById('playIcon');
  const viz = document.getElementById('visualizer');
  const progressFill = document.getElementById('progressFill');
  const currentTimeEl = document.getElementById('currentTime');
  const totalTimeEl = document.getElementById('totalTime');

  const playSVG = `<path d="M8 5v14l11-7z"/>`;
  const pauseSVG = `<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>`;

  function fmt(s) {
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return `${m}:${sec.toString().padStart(2,'0')}`;
  }

  audio.addEventListener('loadedmetadata', () => {
    totalTimeEl.textContent = fmt(audio.duration);
  });

  audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return;
    const pct = (audio.currentTime / audio.duration) * 100;
    progressFill.style.width = pct + '%';
    currentTimeEl.textContent = fmt(audio.currentTime);
  });

  audio.addEventListener('ended', () => {
    playIcon.innerHTML = playSVG;
    viz.classList.remove('playing');
    progressFill.style.width = '0%';
  });

  document.getElementById('progressBar').addEventListener('click', (e) => {
    if (!audio.duration) return;
    const rect = e.currentTarget.getBoundingClientRect();
    const ratio = (e.clientX - rect.left) / rect.width;
    audio.currentTime = ratio * audio.duration;
  });

  function togglePlay() {
    if (audio.paused) {
      audio.play();
      playIcon.innerHTML = pauseSVG;
      viz.classList.add('playing');
    } else {
      audio.pause();
      playIcon.innerHTML = playSVG;
      viz.classList.remove('playing');
    }
  }

  function selectMood(name, desc, file, btn) {
    document.querySelectorAll('.mood-btn:not(.locked)').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('npMood').textContent = name;
    document.getElementById('npDesc').textContent = desc;
    // Switch audio source and play
    const wasPlaying = !audio.paused;
    audio.pause();
    audio.src = file;
    audio.currentTime = 0;
    progressFill.style.width = '0%';
    currentTimeEl.textContent = '0:00';
    totalTimeEl.textContent = '--:--';
    audio.load();
    audio.play();
    playIcon.innerHTML = pauseSVG;
    viz.classList.add('playing');
  }
</script>
</body>
</html>
